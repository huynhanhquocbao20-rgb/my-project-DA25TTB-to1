<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Thanh Toán</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="tinhToan()">

<div class="box">
    <h2>Danh Sách Đơn Hàng</h2>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên SP</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Đơn vị</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>A</td>
                <td><input type="number" id="so1" value="50" oninput="tinhToan()"></td>
                <td><input type="number" id="so2" value="10" oninput="tinhToan()"></td>
                <td>thùng</td>
                <td><input type="text" id="ketQua" readonly></td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
                <td><input type="number" id="gia_B" value="10" oninput="tinhToan()"></td>
                <td><input type="number" id="sl_B" value="20" oninput="tinhToan()"></td>
                <td>bao</td>
                <td><input type="text" id="tien_B" readonly></td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
                <td><input type="number" id="gia_C" value="20" oninput="tinhToan()"></td>
                <td><input type="number" id="sl_C" value="90" oninput="tinhToan()"></td>
                <td>túi</td>
                <td><input type="text" id="tien_C" readonly></td>
            </tr>
            <tr class="tong-ket">
                <td colspan="5">Tổng thanh toán:<input type="text" id="tong_thanh_toan" readonly>
                    <button>
		                <a href="../index.html">Quay lại</a>
            	    </button>
                </td> 
            </tr>
        </tbody>
    </table>
</div>
<script>
function tinhToan() {
    console.log("Đang chạy");
    let so1 = parseFloat(document.getElementById("so1").value) || 0;
    let so2 = parseFloat(document.getElementById("so2").value) || 0;
     let tienA = so1 * so2;
    document.getElementById("ketQua").value  = tienA;

    // Sản phẩm B
    let giaB = parseFloat(document.getElementById("gia_B").value) || 0;
    let slB  = parseFloat(document.getElementById("sl_B").value) || 0;
    let tienB = giaB * slB;
    document.getElementById("tien_B").value = tienB;

    // Sản phẩm C
    let giaC = parseFloat(document.getElementById("gia_C").value) || 0;
    let slC  = parseFloat(document.getElementById("sl_C").value) || 0;
    let tienC = giaC * slC;
    document.getElementById("tien_C").value = tienC;

    // Tổng thanh toán
    let tong = tienA + tienB + tienC;
    document.getElementById("tong_thanh_toan").value = tong;
}
</script>
</body>
</html>
