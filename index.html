<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="formLogin">

        <div class="login-box">

            <h2>Login</h2>

            <div class="form-group">
                <label for="txtUsername">
                    Username:
                </label>

                <input type="text"
                       id="txtUsername"
                       name="txtUsername">
            </div>

            <div class="form-group">
                <label for="txtPassword">
                    Password:
                </label>

                <input type="password"
                       id="txtPassword"
                       name="txtPassword">
            </div>

            <div class="button-group">

                <button type="submit" class="login-btn">
                    Login
                </button>

                <button type="reset" class="cancel-btn">
                    Cancel               
            </div>

        </div>

    </form>
    <div>
        <button>
            <a href="html/bang-cuu-chuong.html">Bảng cửu chương</a>
        </button>
        <button>
            <a href="html/Bang-thanh-toan.html">Bảng thanh toán</a>
        </button>
    </div>
</body>
</html>
